<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>

  <link rel="stylesheet" href="./css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <div class="game-box">
    <h1>Rock Paper Scissors</h1>

    <div class="row mt-4">
      <div class="col-6">
        <h4>Player One</h4>
        <button class="btn btn-outline-primary choice-btn" data-player="1" data-choice="Rock">Rock</button>
        <button class="btn btn-outline-primary choice-btn" data-player="1" data-choice="Paper">Paper</button>
        <button class="btn btn-outline-primary choice-btn" data-player="1" data-choice="Scissors">Scissors</button>
        <p class="mt-2">Choice: <span id="p1-choice" class="fw-bold">-</span></p>
      </div>

      <div class="col-6">
        <h4>Player Two</h4>
        <button class="btn btn-outline-danger choice-btn" data-player="2" data-choice="Rock">Rock</button>
        <button class="btn btn-outline-danger choice-btn" data-player="2" data-choice="Paper">Paper</button>
        <button class="btn btn-outline-danger choice-btn" data-player="2" data-choice="Scissors">Scissors</button>
        <p class="mt-2">Choice: <span id="p2-choice" class="fw-bold">-</span></p>
      </div>
    </div>

    <hr>

    <button id="play-btn" class="btn btn-success btn-lg">Play</button>
    <button id="reset-btn" class="btn btn-secondary btn-lg">Reset</button>
    <h3 id="result" class="mt-4"></h3>
  </div>


  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/game.js"></script>
</body>
</html>
