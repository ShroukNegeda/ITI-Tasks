<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade Checker</title>
  <link rel="stylesheet" href="./css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <div class="game-box">
    <h1>Grade Checker</h1>
    <input type="number" id="grade-input" class="form-control" placeholder="Enter grade (0-100)" min="0" max="100">
    <button id="check-btn" class="btn btn-primary mt-3">Check Grade</button>
    <h3 id="grade-result" class="mt-4"></h3>
  </div>


  <script src="./js/bootstrap.bundle.min.js"></script>
  <script src="./js/grades.js"></script>
</body>
</html>
